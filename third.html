<!DOCTYPE html>
<html>

<head>
    <title>Special Message</title>
    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            color: white;
            font-family: cursive;
            overflow: hidden;
        }

        h1 {
            font-size: 50px;
            margin-top: 30px;
        }

        #giftBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #ff4d6d;
            padding: 30px 60px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 0 25px pink;
        }

        .bigMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-10%, -10%);
            font-size: 40px;
            color: white;
            display: none;
        }

        .heart {
            position: absolute;
            color: red;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }

            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }
    </style>

</head>

<body>
    <h1>For You 💌</h1>
    <div id="giftBox">🎁 Get your gift from here</div>
    <div id="msg" class="bigMessage"> Naane unaku oru periya gift dhana apro ydhuku thaniya gift uhhhh 💖😂</div>
    <script>
        let count = 0;
        const box = document.getElementById("giftBox");
        const msg = document.getElementById("msg");

        box.addEventListener("mouseover", () => {
            if (count < 4) {
                let x = Math.random() * (window.innerWidth - 250);
                let y = Math.random() * (window.innerHeight - 150);
                box.style.left = x + "px";
                box.style.top = y + "px";
                count++;
            }
            else if (count === 4) {
                // bring box back to center
                box.style.left = "50%";
                box.style.top = "50%";
                box.style.transform = "translate(-50%,-50%)";
                count++;
            }
            else {
                // final boom
                box.style.display = "none";
                msg.style.display = "block";
                explodeHearts();
            }
        });

        // floating hearts background
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 150);

        // explosion hearts full screen
        function explodeHearts() {
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.style.position = 'absolute';
                    heart.style.left = (window.innerWidth / 2) + 'px';
                    heart.style.top = (window.innerHeight / 2) + 'px';
                    heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                    heart.style.transition = 'all 1.2s ease-out';
                    document.body.appendChild(heart);

                    setTimeout(() => {
                        heart.style.left = (Math.random() * window.innerWidth) + 'px';
                        heart.style.top = (Math.random() * window.innerHeight) + 'px';
                        heart.style.opacity = 0;
                    }, 10);

                    setTimeout(() => { heart.remove(); }, 1200);
                }, i * 30);
            }
        }
    </script>
</body>

</html>
