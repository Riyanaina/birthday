<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: cursive;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
        }

        .container {
            text-align: center;
            padding: 50px;
            color: white;
        }

        h1 {
            font-size: 60px;
        }

        .btn {
            padding: 15px 30px;
            background: red;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
        }

        .heart {
            color: red;
            font-size: 40px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Happy Birthday Priyaaaaaaa</h1>
        <p class="heart">❤️ ❤️ ❤️ ❤️ ❤️</p>
        <p>Today is your special day ✨</p>
        <a href="second.html"><button class="btn">Get your Wishes from here 🎁</button></a>
    </div>
</body>

</html>
